name: Malaysia RSS Summary

on:
  schedule:
    # 07:30 MYT = 23:30 UTC on the previous day.
    - cron: "30 23 * * *"
  workflow_dispatch:
    inputs:
      enable_body_enrichment:
        description: "Run optional article body enrichment diagnostics"
        required: false
        default: false
        type: boolean
      enable_groq_rendering:
        description: "Run optional Groq rendering diagnostics"
        required: false
        default: false
        type: boolean
      enable_groq_production_overwrite:
        description: "Allow validated Groq merged Markdown to overwrite the production RSS Markdown"
        required: false
        default: false
        type: boolean
      groq_production_candidate:
        description: "Candidate used for validated Groq production overwrite"
        required: false
        default: "merge"
        type: choice
        options:
          - merge
          - json-render
      groq_model:
        description: "Groq model for optional rendering"
        required: false
        default: "llama"
        type: choice
        options:
          - llama
          - gpt-oss
      force_all_groq:
        description: "Send all selected items to Groq when optional rendering is enabled"
        required: false
        default: false
        type: boolean
      debug_groq:
        description: "Capture Groq debug diagnostics when optional rendering is enabled"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: malaysia-rss-summary
  cancel-in-progress: false

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare optional diagnostics
        id: optional
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENABLE_BODY_ENRICHMENT: ${{ github.event.inputs.enable_body_enrichment }}
          INPUT_ENABLE_GROQ_RENDERING: ${{ github.event.inputs.enable_groq_rendering }}
          INPUT_ENABLE_GROQ_PRODUCTION_OVERWRITE: ${{ github.event.inputs.enable_groq_production_overwrite }}
          INPUT_GROQ_PRODUCTION_CANDIDATE: ${{ github.event.inputs.groq_production_candidate }}
          INPUT_FORCE_ALL_GROQ: ${{ github.event.inputs.force_all_groq }}
          INPUT_DEBUG_GROQ: ${{ github.event.inputs.debug_groq }}
          INPUT_GROQ_MODEL: ${{ github.event.inputs.groq_model }}
          VAR_ENABLE_BODY_ENRICHMENT: ${{ vars.MALAYSIA_NEWS_ENABLE_BODY_ENRICHMENT }}
          VAR_ENABLE_GROQ_RENDERING: ${{ vars.MALAYSIA_NEWS_ENABLE_GROQ_RENDERING }}
          VAR_ENABLE_GROQ_PRODUCTION_OVERWRITE: ${{ vars.MALAYSIA_NEWS_ENABLE_GROQ_PRODUCTION_OVERWRITE }}
          VAR_GROQ_PRODUCTION_CANDIDATE: ${{ vars.MALAYSIA_NEWS_GROQ_PRODUCTION_CANDIDATE }}
          VAR_FORCE_ALL_GROQ: ${{ vars.MALAYSIA_NEWS_FORCE_ALL_GROQ }}
          VAR_DEBUG_GROQ: ${{ vars.MALAYSIA_NEWS_DEBUG_GROQ }}
          VAR_GROQ_MODEL: ${{ vars.MALAYSIA_NEWS_GROQ_MODEL }}
        run: |
          set -euo pipefail

          bool_value() {
            case "${1,,}" in
              true|1|yes|on) printf 'true' ;;
              *) printf 'false' ;;
            esac
          }

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            enable_body="$(bool_value "${INPUT_ENABLE_BODY_ENRICHMENT:-false}")"
            enable_groq="$(bool_value "${INPUT_ENABLE_GROQ_RENDERING:-false}")"
            enable_overwrite="$(bool_value "${INPUT_ENABLE_GROQ_PRODUCTION_OVERWRITE:-false}")"
            production_candidate_input="${INPUT_GROQ_PRODUCTION_CANDIDATE:-merge}"
            force_all="$(bool_value "${INPUT_FORCE_ALL_GROQ:-false}")"
            debug_groq="$(bool_value "${INPUT_DEBUG_GROQ:-false}")"
            model_input="${INPUT_GROQ_MODEL:-llama}"
          else
            enable_body="$(bool_value "${VAR_ENABLE_BODY_ENRICHMENT:-false}")"
            enable_groq="$(bool_value "${VAR_ENABLE_GROQ_RENDERING:-false}")"
            enable_overwrite="$(bool_value "${VAR_ENABLE_GROQ_PRODUCTION_OVERWRITE:-false}")"
            production_candidate_input="${VAR_GROQ_PRODUCTION_CANDIDATE:-merge}"
            force_all="$(bool_value "${VAR_FORCE_ALL_GROQ:-false}")"
            debug_groq="$(bool_value "${VAR_DEBUG_GROQ:-false}")"
            model_input="${VAR_GROQ_MODEL:-llama}"
          fi

          case "${production_candidate_input,,}" in
            json-render|json_render|json)
              production_candidate="json-render"
              ;;
            *)
              production_candidate="merge"
              ;;
          esac

          case "${model_input}" in
            gpt-oss|gptoss|openai/gpt-oss-20b)
              model_short="gptoss"
              model_name="openai/gpt-oss-20b"
              ;;
            *)
              model_short="llama"
              model_name="llama-3.3-70b-versatile"
              ;;
          esac

          today="$(TZ=Asia/Kuala_Lumpur date +%F)"
          run_dir="${RUNNER_TEMP}/malaysia-rss-summary-optional-${today}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "${run_dir}"

          {
            echo "# Optional diagnostics status"
            echo ""
            echo "- event: ${EVENT_NAME}"
            echo "- enable_body_enrichment: ${enable_body}"
            echo "- enable_groq_rendering: ${enable_groq}"
            echo "- enable_groq_production_overwrite: ${enable_overwrite}"
            echo "- groq_production_candidate: ${production_candidate}"
            echo "- force_all_groq: ${force_all}"
            echo "- debug_groq: ${debug_groq}"
            echo "- groq_model: ${model_name}"
          } > "${run_dir}/optional_status.md"

          echo "run_dir=${run_dir}" >> "${GITHUB_OUTPUT}"
          echo "enable_body_enrichment=${enable_body}" >> "${GITHUB_OUTPUT}"
          echo "enable_groq_rendering=${enable_groq}" >> "${GITHUB_OUTPUT}"
          echo "enable_groq_production_overwrite=${enable_overwrite}" >> "${GITHUB_OUTPUT}"
          echo "groq_production_candidate=${production_candidate}" >> "${GITHUB_OUTPUT}"
          echo "force_all_groq=${force_all}" >> "${GITHUB_OUTPUT}"
          echo "debug_groq=${debug_groq}" >> "${GITHUB_OUTPUT}"
          echo "groq_model_short=${model_short}" >> "${GITHUB_OUTPUT}"
          echo "groq_model_name=${model_name}" >> "${GITHUB_OUTPUT}"

      - name: Generate Malaysia RSS summary
        id: generate
        shell: bash
        run: |
          set -euo pipefail
          today="$(TZ=Asia/Kuala_Lumpur date +%F)"
          output_path="news/malaysia/${today}.md"
          run_dir="${{ steps.optional.outputs.run_dir }}"
          python3 -B scripts/malaysia_rss_summary.py \
            --include-paul-tan \
            --diagnostics \
            --output "${output_path}" \
            --json-output "${run_dir}/selected_items.json"
          cp "${output_path}" "${run_dir}/rss_production_fallback.md"
          if grep -q "::inbox-item" "${output_path}"; then
            echo "::error::Generated Markdown must not contain ::inbox-item metadata."
            exit 1
          fi
          echo "output_path=${output_path}" >> "${GITHUB_OUTPUT}"

      - name: Install body enrichment dependencies
        if: steps.optional.outputs.enable_body_enrichment == 'true'
        shell: bash
        run: |
          set -u
          run_dir="${{ steps.optional.outputs.run_dir }}"
          if python3 -m pip install newspaper3k lxml_html_clean > "${run_dir}/body_dependency_install_stdout.log" 2> "${run_dir}/body_dependency_install_stderr.log"; then
            echo "success" > "${run_dir}/body_dependency_install_status.txt"
          else
            echo "failed" > "${run_dir}/body_dependency_install_status.txt"
            echo "::warning::Optional body enrichment dependency install failed; RSS-only output will continue."
          fi

      - name: Run optional body enrichment
        if: steps.optional.outputs.enable_body_enrichment == 'true'
        id: body
        shell: bash
        run: |
          set -u
          run_dir="${{ steps.optional.outputs.run_dir }}"
          if python3 -B scripts/enrich_malaysia_selected_items_with_body.py \
            --json-input "${run_dir}/selected_items.json" \
            --output "${run_dir}/selected_items_enriched.json" \
            > "${run_dir}/body_enrichment_stdout.log" \
            2> "${run_dir}/body_enrichment_stderr.log"; then
            echo "success" > "${run_dir}/body_enrichment_status.txt"
            echo "body_enrichment_succeeded=true" >> "${GITHUB_OUTPUT}"
          else
            echo "failed" > "${run_dir}/body_enrichment_status.txt"
            echo "body_enrichment_succeeded=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Optional body enrichment failed; RSS-only output will continue."
          fi

      - name: Run optional Groq rendering
        if: steps.optional.outputs.enable_groq_rendering == 'true'
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set -u
          run_dir="${{ steps.optional.outputs.run_dir }}"
          model_short="${{ steps.optional.outputs.groq_model_short }}"
          model_name="${{ steps.optional.outputs.groq_model_name }}"
          force_all="${{ steps.optional.outputs.force_all_groq }}"
          debug_groq="${{ steps.optional.outputs.debug_groq }}"
          rss_markdown_input="${{ steps.generate.outputs.output_path }}"
          echo "${rss_markdown_input}" > "${run_dir}/rss_markdown_input.txt"

          json_input="${run_dir}/selected_items.json"
          if [ -s "${run_dir}/selected_items_enriched.json" ]; then
            json_input="${run_dir}/selected_items_enriched.json"
          fi
          echo "${json_input}" > "${run_dir}/groq_json_input.txt"

          args=(
            python3 -B scripts/render_malaysia_news_with_groq.py
            --json-input "${json_input}"
            --rss-markdown-input "${rss_markdown_input}"
            --output "${run_dir}/groq_merged_candidate.md"
            --model "${model_name}"
            --improved-items-output "${run_dir}/groq_${model_short}_improved_items.json"
            --json-render-output "${run_dir}/groq_json_render_candidate.md"
            --merge-accepted-with-rss-markdown
          )
          if [ "${force_all}" = "true" ]; then
            args+=(--force-all)
          fi
          if [ "${debug_groq}" = "true" ]; then
            args+=(--debug-groq)
          fi

          if [ -z "${GROQ_API_KEY:-}" ]; then
            if "${args[@]}" > "${run_dir}/groq_${model_short}_stdout.log" 2> "${run_dir}/groq_${model_short}_stderr.log"; then
              echo "skipped_missing_groq_api_key" > "${run_dir}/groq_rendering_status.txt"
            else
              echo "failed_missing_key_fallback_render" > "${run_dir}/groq_rendering_status.txt"
              cp "${rss_markdown_input}" "${run_dir}/groq_merged_candidate.md" || true
              cp "${rss_markdown_input}" "${run_dir}/groq_json_render_candidate.md" || true
              echo "::warning::Optional Groq rendering skipped, and fallback artifact render failed; RSS-only output will continue."
              exit 0
            fi
            echo "::warning::GROQ_API_KEY is not set; optional Groq rendering skipped and RSS-only output will continue."
            exit 0
          fi

          if "${args[@]}" > "${run_dir}/groq_${model_short}_stdout.log" 2> "${run_dir}/groq_${model_short}_stderr.log"; then
            echo "success" > "${run_dir}/groq_rendering_status.txt"
          else
            echo "failed" > "${run_dir}/groq_rendering_status.txt"
            echo "::warning::Optional Groq rendering failed; RSS-only output will continue."
          fi

      - name: Guard optional Groq production overwrite
        shell: bash
        run: |
          set -u
          run_dir="${{ steps.optional.outputs.run_dir }}"
          output_path="${{ steps.generate.outputs.output_path }}"
          model_short="${{ steps.optional.outputs.groq_model_short }}"
          enable_groq="${{ steps.optional.outputs.enable_groq_rendering }}"
          enable_overwrite="${{ steps.optional.outputs.enable_groq_production_overwrite }}"
          production_candidate="${{ steps.optional.outputs.groq_production_candidate }}"
          rss_fallback="${run_dir}/rss_production_fallback.md"
          merge_candidate="${run_dir}/groq_merged_candidate.md"
          json_candidate="${run_dir}/groq_json_render_candidate.md"
          candidate="${merge_candidate}"
          candidate_label="merge"
          candidate_status="merge"
          improved_items="${run_dir}/groq_${model_short}_improved_items.json"
          rendering_status_file="${run_dir}/groq_rendering_status.txt"
          overwrite_status="${run_dir}/groq_production_overwrite_status.txt"
          overwrite_candidate_status="${run_dir}/groq_production_overwrite_candidate.txt"
          validator_status="${run_dir}/groq_production_overwrite_validator_status.json"
          validator_report="${run_dir}/groq_production_overwrite_validator_report.md"

          if [ "${production_candidate}" = "json-render" ]; then
            candidate="${json_candidate}"
            candidate_label="json-render"
            candidate_status="json_render"
          fi
          echo "${candidate_label}" > "${overwrite_candidate_status}"

          restore_rss_fallback() {
            if [ -f "${rss_fallback}" ]; then
              cp "${rss_fallback}" "${output_path}"
            fi
          }

          if [ "${enable_overwrite}" != "true" ]; then
            echo "skipped_overwrite_disabled" > "${overwrite_status}"
            restore_rss_fallback
            exit 0
          fi

          if [ "${enable_groq}" != "true" ]; then
            echo "skipped_groq_rendering_disabled" > "${overwrite_status}"
            restore_rss_fallback
            exit 0
          fi

          if [ ! -s "${rendering_status_file}" ]; then
            echo "skipped_missing_groq_rendering_status" > "${overwrite_status}"
            restore_rss_fallback
            exit 0
          fi

          rendering_status="$(cat "${rendering_status_file}")"
          if [ "${rendering_status}" != "success" ]; then
            echo "skipped_groq_rendering_${rendering_status}" > "${overwrite_status}"
            restore_rss_fallback
            exit 0
          fi

          if [ ! -s "${candidate}" ]; then
            echo "skipped_missing_groq_${candidate_status}_candidate" > "${overwrite_status}"
            restore_rss_fallback
            exit 0
          fi

          if [ ! -s "${improved_items}" ]; then
            echo "skipped_missing_improved_items_json" > "${overwrite_status}"
            restore_rss_fallback
            exit 0
          fi

          if python3 -B scripts/validate_malaysia_groq_merged_candidate.py \
            --selected-json "${run_dir}/selected_items.json" \
            --candidate-markdown "${candidate}" \
            --improved-items-json "${improved_items}" \
            --rss-fallback-markdown "${rss_fallback}" \
            --status-output "${validator_status}" \
            --report-output "${validator_report}" \
            > "${run_dir}/groq_production_overwrite_validator_stdout.log" \
            2> "${run_dir}/groq_production_overwrite_validator_stderr.log"; then
            if cp "${candidate}" "${output_path}"; then
              if [ "${candidate_label}" = "merge" ]; then
                echo "applied" > "${overwrite_status}"
              else
                echo "applied_${candidate_status}" > "${overwrite_status}"
              fi
            else
              echo "failed_candidate_copy" > "${overwrite_status}"
              restore_rss_fallback
              echo "::warning::Groq production overwrite validation passed, but candidate copy failed; RSS Markdown remains production output."
            fi
          else
            echo "skipped_validator_failed_${candidate_status}" > "${overwrite_status}"
            restore_rss_fallback
            echo "::warning::Groq production overwrite validator failed; RSS Markdown remains production output."
          fi

      - name: Validate optional Groq JSON render candidate
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -u
          run_dir="${{ steps.optional.outputs.run_dir }}"
          model_short="${{ steps.optional.outputs.groq_model_short }}"
          json_candidate="${run_dir}/groq_json_render_candidate.md"
          merge_candidate="${run_dir}/groq_merged_candidate.md"
          rss_fallback="${run_dir}/rss_production_fallback.md"
          improved_items="${run_dir}/groq_${model_short}_improved_items.json"
          validator_status="${run_dir}/groq_json_render_validator_status.json"
          validator_report="${run_dir}/groq_json_render_validator_report.md"
          diff_output="${run_dir}/groq_json_render_diff.txt"

          if [ -s "${merge_candidate}" ] && [ -s "${json_candidate}" ]; then
            if diff -u "${merge_candidate}" "${json_candidate}" > "${diff_output}"; then
              if [ ! -s "${diff_output}" ]; then
                echo "no differences" > "${diff_output}"
              fi
            else
              :
            fi
          else
            {
              echo "merge_candidate=${merge_candidate}"
              echo "json_candidate=${json_candidate}"
              echo "one_or_both_candidates_missing"
            } > "${diff_output}"
          fi

          if [ ! -s "${json_candidate}" ] || [ ! -s "${improved_items}" ] || [ ! -s "${rss_fallback}" ]; then
            printf '%s\n' '{"passed": false, "failures": ["missing_json_render_observation_inputs"]}' > "${validator_status}"
            {
              echo "# Groq JSON render candidate validator"
              echo ""
              echo "- status: skipped"
              echo "- reason: missing_json_render_observation_inputs"
            } > "${validator_report}"
            echo "::notice::Optional JSON render candidate validation skipped; observation inputs are missing."
            exit 0
          fi

          if python3 -B scripts/validate_malaysia_groq_merged_candidate.py \
            --selected-json "${run_dir}/selected_items.json" \
            --candidate-markdown "${json_candidate}" \
            --improved-items-json "${improved_items}" \
            --rss-fallback-markdown "${rss_fallback}" \
            --status-output "${validator_status}" \
            --report-output "${validator_report}" \
            > "${run_dir}/groq_json_render_validator_stdout.log" \
            2> "${run_dir}/groq_json_render_validator_stderr.log"; then
            :
          else
            echo "::notice::Optional JSON render candidate validator failed; observation artifact only."
          fi

      - name: Build Malaysia news index
        shell: bash
        run: |
          set -euo pipefail
          output_path="${{ steps.generate.outputs.output_path }}"
          python3 -B scripts/build_malaysia_news_index.py
          if grep -q "::inbox-item" "${output_path}"; then
            echo "::error::Generated Markdown must not contain ::inbox-item metadata."
            exit 1
          fi
          if grep -q "::inbox-item" news/malaysia/index.html; then
            echo "::error::Generated index.html must not contain ::inbox-item metadata."
            exit 1
          fi

      - name: Upload optional diagnostics artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: malaysia-rss-summary-optional-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/malaysia-rss-summary-optional-*
          if-no-files-found: warn

      - name: Commit generated summary
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- news/malaysia/ && [ -z "$(git ls-files --others --exclude-standard news/malaysia/)" ]; then
            echo "No changes under news/malaysia/."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news/malaysia/
          git commit -m "Add Malaysia RSS summary for $(TZ=Asia/Kuala_Lumpur date +%F)"
          if ! git push; then
            echo "::error::git push failed. Repository Settings > Actions > General > Workflow permissions を確認してください。"
            exit 1
          fi
