<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    >
    <title>ひとつだけ</title>
    <meta name="theme-color" content="#365e4d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ひとつだけ">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta
      name="description"
      content="思いついた用事を預けて、次のひとつだけに取り組むための画面"
    >
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
    <link rel="stylesheet" href="./styles.css">
    <script src="./storage.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <p id="error-message" class="error-message" role="alert" hidden></p>

      <section id="top-screen" class="screen">
        <header class="app-header">
          <div class="header-row">
            <div>
              <p class="app-kicker">ONE NEXT TASK</p>
              <h1>ひとつだけ</h1>
            </div>
            <button id="manage-button" type="button">登録済み</button>
          </div>
          <p class="completion-count">
            今日の完了
            <strong id="completion-count">0件</strong>
          </p>
        </header>

        <form id="task-form" class="task-form" novalidate>
          <label for="task-input">思いついた用事を預ける</label>
          <div class="input-row">
            <input
              id="task-input"
              name="task"
              type="text"
              inputmode="text"
              autocomplete="off"
              placeholder="一行で入力"
            >
            <button id="add-button" type="submit">追加</button>
          </div>
        </form>

        <section
          id="task-area"
          class="task-area"
          aria-live="polite"
          aria-atomic="true"
        >
          <div id="current-view" class="state-panel" hidden>
            <p class="state-label">次にやること</p>
            <p id="task-text" class="task-text"></p>
            <div class="action-row">
              <button
                id="complete-button"
                class="primary-action"
                type="button"
              >
                完了
              </button>
              <button id="defer-button" type="button">あとで</button>
            </div>
          </div>

          <div id="cycle-view" class="state-panel message-panel" hidden>
            <h2>いま取り組む候補は一周しました</h2>
            <p>新しい用事を追加するか、次に開いたときに再開できます。</p>
          </div>

          <div id="empty-view" class="state-panel message-panel" hidden>
            <h2>今日はここまで</h2>
            <p>未完了の用事はありません。</p>
          </div>

          <div id="blocked-view" class="state-panel message-panel" hidden>
            <h2>操作を停止しています</h2>
            <p>保存データを変更せず、そのまま残しています。</p>
          </div>
        </section>
      </section>

      <section
        id="management-screen"
        class="screen management-screen"
        aria-labelledby="management-title"
        hidden
      >
        <header class="management-header">
          <button id="back-button" type="button">トップへ戻る</button>
          <div>
            <p class="app-kicker">REGISTERED TASKS</p>
            <h1 id="management-title">登録済み</h1>
          </div>
        </header>

        <p id="management-empty" class="management-empty" hidden>
          未完了の用事はありません。
        </p>
        <ul id="management-list" class="management-list"></ul>
      </section>
    </main>
  </body>
</html>
