<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桃香記憶帖</title>
  <meta name="description" content="スクロールで香りの層を探し、タップで桃の香りを嗅ぎ当てる、夢っぽい和風の記憶パズルです。">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game" aria-label="桃香記憶帖">
    <section class="topbar" aria-label="ゲーム情報">
      <a class="home-link" href="../experiments.html" aria-label="実験一覧へ戻る">←</a>
      <div class="metric">
        <span>得点</span>
        <strong id="score">0</strong>
      </div>
      <div class="metric">
        <span>段</span>
        <strong id="round">1</strong>
      </div>
      <div class="metric">
        <span>集中</span>
        <strong id="focus">100</strong>
      </div>
      <div class="metric">
        <span>最良</span>
        <strong id="best-score">0</strong>
      </div>
    </section>

    <section class="stage-wrap">
      <div class="scroll-spacer" aria-hidden="true"></div>
      <button id="stage" class="stage" type="button" aria-label="現在の香りを嗅ぐ">
        <div class="paper-grain" aria-hidden="true"></div>
        <div class="moon-seal" aria-hidden="true"></div>
        <div id="scent-layer" class="scent-layer" aria-hidden="true"></div>

        <div id="peach" class="peach" aria-hidden="true">
          <span class="peach__body"></span>
          <span class="peach__cleft"></span>
          <span class="peach__leaf"></span>
          <span class="peach__shine"></span>
        </div>

        <div class="scent-reader" aria-live="polite">
          <span id="phase-label">記憶</span>
          <strong id="current-scent">白桃</strong>
          <small id="hint">桃から現れる香りの順を覚えてください</small>
        </div>

        <div class="depth-rail" aria-hidden="true">
          <span></span>
          <i id="depth-marker"></i>
        </div>

        <div id="floating-layer" class="floating-layer" aria-hidden="true"></div>
      </button>
    </section>

    <section class="bottom-panel" aria-label="記憶と操作">
      <div id="memory-strip" class="memory-strip" aria-label="記憶した香りの順番"></div>
      <div class="actions">
        <p id="status">香り札を見届けたら、巻物をスクロールして同じ順に嗅ぎます。</p>
        <button id="restart-button" type="button">はじめから</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
